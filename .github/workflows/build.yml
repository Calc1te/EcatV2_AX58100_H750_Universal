name: Build Firmware

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  sync:
    runs-on: ubuntu-latest
    container: pandoc/latex

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Push to another repo
        uses: Calc1te/github-action-push-to-another-repository@main
        env:
          SSH_DEPLOY_KEY: ${{ secrets.SSH_DEPLOY_KEY }}
          API_TOKEN_GITHUB: ${{ secrets.API_TOKEN_GITHUB }}
        with:
          # source-directory: 'Application'
          # target-directory: 'Application'
          include-patterns-file: 'sync_files'
          destination-github-username: 'Calc1te'
          destination-repository-name: 'EcatV2_AX58100_H723_Universal'
          user-email: calcitevalentin@outlook.com
          target-branch: main

  build:
    needs: sync
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout SOES
        run: |
          git submodule update --init --recursive --force

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build gcc-arm-none-eabi binutils-arm-none-eabi

      - name: Configure CMake
        run: |
          cmake -DCMAKE_BUILD_TYPE=Release \
            --preset Release \
            -S ${{ github.workspace }} \
            -B ${{ github.workspace }}/build/Release

      - name: Build firmware
        run: |
          cmake --build ${{ github.workspace }}/build/Release \
            --target EcatV2_AX58100_H750_Universal

      - name: Upload ELF artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-elf
          path: ${{ github.workspace }}/build/Release/EcatV2_AX58100_H750_Universal.elf
